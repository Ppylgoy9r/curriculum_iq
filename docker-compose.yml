services:
  app:
    build: .
    ports:
      - "3000:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/curriculum_iq?schema=public
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - curriculum-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=curriculum_iq
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - curriculum-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - curriculum-network

networks:
  curriculum-network:
    driver: bridge

volumes:
  ollama_data:
